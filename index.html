<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GubbSplinta Matchoff</title>
  <meta name="description" content="Repeterande nedräkning i taktisk neonstil.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#030603;
      --surface:#071008;
      --surface-2:#09140b;
      --grid:#112515;
      --border:#3d7a34;
      --text:#b8f59b;
      --text-strong:#8df777;
      --text-muted:#79a86c;
      --accent:#88e67b;
      --accent-2:#63e46d;
      --glow:rgba(132,240,117,.45);
      --glow-soft:rgba(132,240,117,.18);
      --radius:18px;
      --space:16px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:#000;color:var(--text);font-family:'Share Tech Mono',monospace;min-height:100%}
    body{
      min-height:100vh;
      background:
        radial-gradient(circle at 50% 18%, rgba(136,230,123,.17), transparent 18%),
        radial-gradient(circle at 50% 38%, rgba(136,230,123,.07), transparent 28%),
        repeating-linear-gradient(to bottom, rgba(120,255,120,.06) 0 1px, transparent 1px 4px),
        linear-gradient(180deg, #020302 0%, #030603 35%, #020302 100%);
      letter-spacing:.06em;
    }
    body::before{
      content:"";
      position:fixed; inset:0;
      pointer-events:none;
      background:
        linear-gradient(to right, transparent 0 9%, rgba(80,255,120,.02) 10%, transparent 11% 19%, rgba(80,255,120,.02) 20%, transparent 21% 29%, rgba(80,255,120,.02) 30%, transparent 31% 39%, rgba(80,255,120,.02) 40%, transparent 41% 49%, rgba(80,255,120,.02) 50%, transparent 51% 59%, rgba(80,255,120,.02) 60%, transparent 61% 69%, rgba(80,255,120,.02) 70%, transparent 71% 79%, rgba(80,255,120,.02) 80%, transparent 81% 89%, rgba(80,255,120,.02) 90%, transparent 91%),
        radial-gradient(circle at center, transparent 60%, rgba(0,0,0,.25));
      mix-blend-mode:screen;
    }
    .wrap{max-width:860px;margin:0 auto;padding:24px 18px 40px}
    .panel{
      border:1px solid rgba(136,230,123,.34);
      background:linear-gradient(180deg, rgba(5,12,6,.92), rgba(4,8,4,.92));
      box-shadow:0 0 0 1px rgba(136,230,123,.08) inset, 0 0 28px rgba(110,255,140,.08), 0 0 60px rgba(110,255,140,.05);
      border-radius:var(--radius);
      backdrop-filter:blur(1px);
    }
    .hero{padding:34px 20px 26px;text-align:center;position:relative;overflow:hidden}
    .hero::after{
      content:"";position:absolute;left:6%;right:6%;top:42%;height:76px;
      background:radial-gradient(circle, rgba(136,230,123,.28), rgba(136,230,123,.08) 50%, transparent 72%);
      filter:blur(14px);
      pointer-events:none;
    }
    .dots{display:flex;justify-content:center;gap:22px;margin-bottom:24px}
    .dot{width:22px;height:22px;border-radius:50%;background:var(--accent);box-shadow:0 0 18px var(--glow),0 0 34px var(--glow)}
    .dot:nth-child(2){width:28px;height:28px}
    .kicker,.subline,.footline,label,.folder,.tiny{color:var(--text-muted);text-transform:uppercase}
    .kicker{font-size:12px;letter-spacing:.45em;margin-bottom:10px}
    h1{font:800 clamp(2.5rem,8vw,5.4rem)/.92 'Orbitron',sans-serif;margin:0;color:var(--accent);text-transform:uppercase;text-shadow:0 0 16px rgba(136,230,123,.6),0 0 42px rgba(136,230,123,.24)}
    .subline{font-size:15px;letter-spacing:.38em;margin-top:10px}
    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:22px}
    .box{padding:20px 10px;border-radius:14px;border:1px solid rgba(136,230,123,.3);background:linear-gradient(180deg, rgba(7,16,8,.92), rgba(4,10,5,.94));text-align:center;box-shadow:0 0 26px rgba(132,240,117,.08) inset,0 0 24px rgba(132,240,117,.07)}
    .num{display:block;font:500 clamp(2.2rem,6.5vw,4rem)/1 'Share Tech Mono',monospace;color:#d4ffbf;text-shadow:0 0 10px rgba(136,230,123,.35)}
    .label{display:block;margin-top:8px;font-size:12px;letter-spacing:.42em;color:var(--text-muted);text-transform:uppercase}
    .status{margin-top:24px;padding:18px 16px;border-top:1px solid rgba(136,230,123,.22);border-bottom:1px solid rgba(136,230,123,.22);font-size:clamp(1rem,2.8vw,1.5rem);line-height:1.35;text-transform:uppercase;color:#d5ffc2;text-shadow:0 0 8px rgba(136,230,123,.15)}
    .status .cursor{display:inline-block;width:12px;height:1.2em;background:var(--accent);vertical-align:middle;box-shadow:0 0 12px rgba(136,230,123,.6);animation:blink 1.1s steps(1) infinite;margin-left:8px}
    @keyframes blink{50%{opacity:0}}
    .actions,.settings,.maps{margin-top:22px;padding:18px}
    .actions{display:grid;gap:14px}
    .btn,.input,.select{width:100%;border-radius:10px;border:1px solid rgba(136,230,123,.32);font:500 1rem 'Share Tech Mono',monospace;letter-spacing:.18em;text-transform:uppercase}
    .btn{padding:18px 16px;background:transparent;color:var(--accent);cursor:pointer;box-shadow:0 0 0 1px rgba(136,230,123,.06) inset,0 0 18px rgba(136,230,123,.06)}
    .btn.primary{background:linear-gradient(180deg, #8ce183, #82dc79);color:#0b1608;border-color:#a9f39d;box-shadow:0 0 24px rgba(136,230,123,.24)}
    .btn:hover{filter:brightness(1.08)}
    .two{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .settings h2,.maps h2{font:700 1rem 'Orbitron',sans-serif;letter-spacing:.24em;text-transform:uppercase;color:var(--text-strong);margin:0 0 16px}
    .settings-grid{display:grid;gap:14px}
    .input,.select{padding:15px 14px;background:#030703;color:#d7ffc5}
    .map-list{display:grid;gap:12px}
    .map-item{padding:14px;border-radius:12px;border:1px solid rgba(136,230,123,.22);background:rgba(7,16,8,.85)}
    .map-name{font-size:1.1rem;color:#d7ffc5}
    .footline{margin-top:24px;padding:0 4px;font-size:13px;letter-spacing:.28em;line-height:1.7}
    @media (max-width:700px){
      .grid{grid-template-columns:repeat(2,1fr)}
      .two{grid-template-columns:1fr}
      .wrap{padding:16px 12px 28px}
      .hero{padding:28px 14px 22px}
      .subline,.kicker,.footline,.label{letter-spacing:.28em}
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="panel hero">
      <div class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
      <div class="kicker">// UPPDRAG: SPELKVÄLL //</div>
      <h1 id="heroTitle">GUBBSPLINTA</h1>
      <div class="subline">SPLINTER CELL: CHAOS THEORY</div>

      <div class="grid">
        <div class="box"><span class="num" id="days">00</span><span class="label">DAGAR</span></div>
        <div class="box"><span class="num" id="hours">00</span><span class="label">TIMMAR</span></div>
        <div class="box"><span class="num" id="minutes">00</span><span class="label">MINUTER</span></div>
        <div class="box"><span class="num" id="seconds">00</span><span class="label">SEKUNDER</span></div>
      </div>

      <div class="status"><span id="targetText">NÄSTA INSATS: --</span><span class="cursor"></span></div>
    </section>

    <section class="panel actions">
      <button class="btn primary" type="button" id="downloadCal">⬇ LADDA NER KALENDER (.CAL)</button>
      <div class="two">
        <button class="btn" type="button" id="randomizeMaps">⚙ SLUMPA MAPPAR</button>
        <button class="btn" type="button" id="copyMapNames">⎘ KOPIERA FILNAMN</button>
      </div>
    </section>

    <section class="panel settings">
      <h2>Boka om</h2>
      <form id="countdownForm" class="settings-grid">
        <div>
          <label for="title">Rubrik</label>
          <input class="input" id="title" type="text" value="GUBBSPLINTA">
        </div>
        <div class="two">
          <div>
            <label for="weekday">Veckodag</label>
            <select class="select" id="weekday">
              <option value="1">Måndag</option>
              <option value="2" selected>Tisdag</option>
              <option value="3">Onsdag</option>
              <option value="4">Torsdag</option>
              <option value="5">Fredag</option>
              <option value="6">Lördag</option>
              <option value="0">Söndag</option>
            </select>
          </div>
          <div>
            <label for="timeText">Tid (24H)</label>
            <input class="input" id="timeText" type="text" inputmode="numeric" pattern="^([01][0-9]|2[0-3]):[0-5][0-9]$" value="20:30" placeholder="20:30">
          </div>
        </div>
        <div class="two">
          <button class="btn primary" type="submit">SPARA</button>
          <button class="btn" type="button" id="presetTuesday">TIS 20:30</button>
        </div>
      </form>
    </section>

    <section class="panel maps">
      <h2>Aktiva mappar</h2>
      <div class="map-list" id="mapList"></div>
      <p class="tiny" id="copyStatus"></p>
    </section>

    <div class="footline" id="footLine">ORDINARIE: VARJE TISDAG 20:30 · SISTA PLATSEN ÄR ALLTID STEEL SQUAT ELLER ZIOPLEX</div>
  </main>

  <script>
    const weekdayNames = ['SÖNDAG','MÅNDAG','TISDAG','ONSDAG','TORSDAG','FREDAG','LÖRDAG'];
    const form = document.getElementById('countdownForm');
    const titleInput = document.getElementById('title');
    const weekdayInput = document.getElementById('weekday');
    const timeInput = document.getElementById('timeText');
    const targetText = document.getElementById('targetText');
    const copyStatus = document.getElementById('copyStatus');
    const mapList = document.getElementById('mapList');
    const heroTitle = document.getElementById('heroTitle');
    const footLine = document.getElementById('footLine');
    const els = { days: document.getElementById('days'), hours: document.getElementById('hours'), minutes: document.getElementById('minutes'), seconds: document.getElementById('seconds') };
    const defaultMaps = [
      { file: 'AquaE.sdc', full: 'Aqua' },
      { file: 'BankP.sdc', full: 'Panama Bank' },
      { file: 'CineU.sdc', full: 'Cinema' },
      { file: 'CpusS.sdc', full: 'Cpuss' },
      { file: 'DeftS.sdc', full: 'Deftech Belew' },
      { file: 'Entry.sdc', full: 'Entry' },
      { file: 'FactP.sdc', full: 'Factory' },
      { file: 'GhostS.sdc', full: 'Ghost' },
      { file: 'KrauU.sdc', full: 'Krauser Lab' },
      { file: 'Lobby.sdc', full: 'Lobby' },
      { file: 'Mise.sdc', full: 'Missile' },
      { file: 'MounU.sdc', full: 'Mount Hospital' },
      { file: 'MuseE.sdc', full: 'Museum' },
      { file: 'OffsD.sdc', full: 'Offshore Oilrig' },
      { file: 'OrphS.sdc', full: 'Orphanage' },
      { file: 'PanaS.sdc', full: 'Panama' },
      { file: 'PolaP.sdc', full: 'Polar Base' },
      { file: 'RiveI.sdc', full: 'Riverside' },
      { file: 'Sance.sdc', full: 'Sanctuary' },
      { file: 'ScheU.sdc', full: 'Schermerhorn' },
      { file: 'ShadP.sdc', full: 'Shadow Moses' },
      { file: 'SkysD.sdc', full: 'SpyScraper' },
      { file: 'SlauS.sdc', full: 'Slaughter House' },
      { file: 'StatP.sdc', full: 'State Union' },
      { file: 'SteeP.sdc', full: 'Steel Squat' },
      { file: 'StroD.sdc', full: 'Stockhouse' },
      { file: 'TermD.sdc', full: 'Terminal' },
      { file: 'VertL.sdc', full: 'Vertigo' },
      { file: 'WareP.sdc', full: 'Warehouse' },
      { file: 'ZiopD.sdc', full: 'Zioplex' }
    ];
    let maps = [...defaultMaps];
    let currentMapPick = [];
    let currentConfig = { title: 'GUBBSPLINTA', weekday: 2, time: '20:30' };

    function validTime(value) {
      return /^([01][0-9]|2[0-3]):[0-5][0-9]$/.test(value);
    }

    function getNextOccurrence(targetWeekday, timeValue) {
      const now = new Date();
      const [hours, minutes] = timeValue.split(':').map(Number);
      const target = new Date(now);
      target.setHours(hours, minutes, 0, 0);
      let diffDays = (targetWeekday - now.getDay() + 7) % 7;
      if (diffDays === 0 && target <= now) diffDays = 7;
      target.setDate(now.getDate() + diffDays);
      return target;
    }

    function formatTarget(date) {
      const weekday = new Intl.DateTimeFormat('sv-SE', { weekday: 'long' }).format(date).toUpperCase();
      const datePart = new Intl.DateTimeFormat('sv-SE', { day: 'numeric', month: 'long', year: 'numeric' }).format(date).toUpperCase();
      const timePart = new Intl.DateTimeFormat('sv-SE', { hour: '2-digit', minute: '2-digit', hour12: false }).format(date);
      return `${weekday} ${datePart} KL ${timePart}`;
    }

    function updateCountdown() {
      const next = getNextOccurrence(currentConfig.weekday, currentConfig.time);
      const totalSeconds = Math.max(0, Math.floor((next - new Date()) / 1000));
      els.days.textContent = String(Math.floor(totalSeconds / 86400)).padStart(2, '0');
      els.hours.textContent = String(Math.floor((totalSeconds % 86400) / 3600)).padStart(2, '0');
      els.minutes.textContent = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, '0');
      els.seconds.textContent = String(totalSeconds % 60).padStart(2, '0');
      heroTitle.textContent = currentConfig.title || 'GUBBSPLINTA';
      targetText.textContent = 'NÄSTA INSATS: ' + formatTarget(next);
      footLine.textContent = 'ORDINARIE: VARJE ' + weekdayNames[currentConfig.weekday] + ' ' + currentConfig.time + ' · SISTA PLATSEN ÄR ALLTID STEEL SQUAT ELLER ZIOPLEX';
    }

    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function parseMapLine(line) {
      const trimmed = line.trim();
      if (!trimmed || trimmed.startsWith('#')) return null;
      const parts = trimmed.split('|').map(part => part.trim()).filter(Boolean);
      if (parts.length === 0) return null;
      if (parts.length === 1) return { file: parts[0], full: parts[0].replace(/\.[^.]+$/, '') };
      return { file: parts[0], full: parts.slice(1).join(' | ') };
    }

    async function loadMapsFromTextFile() {
      try {
        const response = await fetch('./banor.txt', { cache: 'no-store' });
        if (!response.ok) throw new Error('Kunde inte läsa banor.txt');
        const content = await response.text();
        const parsedMaps = content.split(/\r?\n/).map(parseMapLine).filter(Boolean);
        if (parsedMaps.length >= 4) {
          maps = parsedMaps;
          copyStatus.textContent = 'BANOR LÄSTA FRÅN BANOR.TXT.';
          return;
        }
        copyStatus.textContent = 'BANOR.TXT HAR FÖR FÅ RADER, STANDARDLISTA ANVÄNDS.';
      } catch {
        copyStatus.textContent = 'BANOR.TXT HITTADES INTE, STANDARDLISTA ANVÄNDS.';
      }
      maps = [...defaultMaps];
    }

    function renderMaps() {
      const alwaysLastPool = maps.filter(map => ['SteeP.sdc', 'ZiopD.sdc'].includes(map.file));
      if (maps.length < 4) {
        currentMapPick = shuffle(maps).slice(0, Math.min(4, maps.length));
      } else if (alwaysLastPool.length) {
        const forcedLast = shuffle(alwaysLastPool)[0];
        const regularPool = maps.filter(map => map.file !== forcedLast.file);
        currentMapPick = shuffle(regularPool).slice(0, 3);
        currentMapPick.push(forcedLast);
      } else {
        currentMapPick = shuffle(maps).slice(0, 4);
      }
      mapList.innerHTML = currentMapPick.map((map, index) => `
        <div class="map-item">
          <div class="folder">${index + 1}. ${map.file}</div>
          <div class="map-name">${map.full}</div>
        </div>
      `).join('');
      copyStatus.textContent = 'MAPPOOL UPPDATERAD.';
    }

    async function copyMapNames() {
      const text = currentMapPick.map(m => m.file).join('\n');
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const area = document.createElement('textarea');
        area.value = text;
        document.body.appendChild(area);
        area.select();
        document.execCommand('copy');
        area.remove();
      }
      copyStatus.textContent = 'FILNAMN KOPIERADE.';
    }

    function escapeCal(value) {
      return String(value).replace(/\\/g, '\\\\').replace(/\r?\n/g, '\\n').replace(/,/g, '\\,').replace(/;/g, '\\;');
    }

    function formatCalUTC(date) {
      const pad = n => String(n).padStart(2, '0');
      return date.getUTCFullYear() + pad(date.getUTCMonth() + 1) + pad(date.getUTCDate()) + 'T' + pad(date.getUTCHours()) + pad(date.getUTCMinutes()) + pad(date.getUTCSeconds()) + 'Z';
    }

    function downloadCalForMaps() {
      if (!currentMapPick.length) {
        copyStatus.textContent = 'SLUMPA MAPPAR FÖRST.';
        return;
      }
      const now = new Date();
      const start = new Date(now.getTime() + 30 * 60 * 1000);
      const end = new Date(start.getTime() + 60 * 60 * 1000);
      const lines = ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//GubbSplinta Matchoff//Chaos Theory//SV','CALSCALE:GREGORIAN'];
      currentMapPick.forEach((map, index) => {
        lines.push('BEGIN:VEVENT');
        lines.push('UID:gubbsplinta-' + now.getTime() + '-' + index + '@local');
        lines.push('DTSTAMP:' + formatCalUTC(now));
        lines.push('DTSTART:' + formatCalUTC(start));
        lines.push('DTEND:' + formatCalUTC(end));
        lines.push('SUMMARY:' + escapeCal('GubbSplinta Matchoff: ' + map.full));
        lines.push('DESCRIPTION:' + escapeCal('Map: ' + map.file + ' — ' + map.full));
        lines.push('END:VEVENT');
      });
      lines.push('END:VCALENDAR');
      const blob = new Blob([lines.join('\r\n')], { type: 'text/calendar;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'GubbSplinta-Matchoff.cal';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      copyStatus.textContent = 'KALENDERFIL SKAPAD.';
    }

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      const timeValue = timeInput.value.trim();
      if (!validTime(timeValue)) {
        copyStatus.textContent = 'ANGE TID SOM 24H, T.EX. 20:30.';
        timeInput.focus();
        return;
      }
      currentConfig = { title: titleInput.value.trim() || 'GUBBSPLINTA', weekday: Number(weekdayInput.value), time: timeValue };
      updateCountdown();
      copyStatus.textContent = 'TID OCH RUBRIK UPPDATERAD.';
    });

    document.getElementById('presetTuesday').addEventListener('click', () => {
      weekdayInput.value = '2';
      timeInput.value = '20:30';
      titleInput.value = 'GUBBSPLINTA';
      form.requestSubmit();
    });
    document.getElementById('randomizeMaps').addEventListener('click', renderMaps);
    document.getElementById('copyMapNames').addEventListener('click', copyMapNames);
    document.getElementById('downloadCal').addEventListener('click', downloadCalForMaps);

    updateCountdown();
    loadMapsFromTextFile().then(renderMaps);
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
