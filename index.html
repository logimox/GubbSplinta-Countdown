<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GubbSplinta Matchoff</title>
  <meta name="description" content="Repeterande nedräkning med regnig Splinter Cell-känsla, Discord-postning och GitHub-synk.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="rain-layer" aria-hidden="true"></div>
  <main class="wrap">
    <section class="hero panel">
      <div class="lens-scene" aria-hidden="true">
        <div class="blood-drop"></div>
        <div class="lens top"></div>
        <div class="lens left"></div>
        <div class="lens right"></div>
        <div class="mist"></div>
      </div>
      <p class="eyebrow">// OPERATION: GUBBSPLINTA //</p>
      <h1>GUBBSPLINTA</h1>
      <p class="subline">TACTICAL COUNTDOWN PROTOCOL</p>
    </section>

    <section class="panel countdown-panel">
      <div class="grid">
        <div class="box"><span class="num" id="days">00</span><span class="label">DAGAR</span></div>
        <div class="box"><span class="num" id="hours">00</span><span class="label">TIMMAR</span></div>
        <div class="box"><span class="num" id="minutes">00</span><span class="label">MINUTER</span></div>
        <div class="box"><span class="num" id="seconds">00</span><span class="label">SEKUNDER</span></div>
      </div>
      <div class="status"><span id="targetText">NÄSTA INSATS: --</span><span class="cursor"></span></div>
      <div class="countdown-note" id="countdownNote">KVAR TILL SPEL: --</div>
    </section>

    <section class="panel actions">
      <div class="two">
        <button class="btn primary" type="button" id="randomizeMaps">⚙ SLUMPA MAPPAR</button>
        <button class="btn discord" type="button" id="postDiscord">✈ POSTA TILL DISCORD</button>
      </div>
      <div class="two secondary-actions">
        <button class="btn" type="button" id="copyMapNames">⎘ KOPIERA FILNAMN</button>
        <button class="btn" type="button" id="downloadCal">⬇ LADDA NER KALENDER (.CAL)</button>
      </div>
    </section>

    <section class="panel settings">
      <h2>Boka om</h2>
      <form id="countdownForm" class="settings-grid">
        <div class="two">
          <div>
            <label for="weekday">Veckodag</label>
            <select class="select" id="weekday">
              <option value="1">Måndag</option>
              <option value="2" selected>Tisdag</option>
              <option value="3">Onsdag</option>
              <option value="4">Torsdag</option>
              <option value="5">Fredag</option>
              <option value="6">Lördag</option>
              <option value="0">Söndag</option>
            </select>
          </div>
          <div>
            <label for="timeText">Tid (24H)</label>
            <input class="input" id="timeText" type="text" inputmode="numeric" pattern="^([01][0-9]|2[0-3]):[0-5][0-9]$" value="20:30" placeholder="20:30">
          </div>
        </div>
        <div class="two">
          <button class="btn primary" type="submit">SPARA</button>
          <button class="btn" type="button" id="presetTuesday">TIS 20:30</button>
        </div>
      </form>
    </section>

    <section class="panel maps">
      <h2>Aktivt förslag</h2>
      <div class="map-list" id="mapList"></div>
      <p class="tiny" id="copyStatus"></p>
    </section>

    <div class="footline" id="footLine">ORDINARIE: VARJE TISDAG 20:30 · SISTA PLATSEN ÄR ALLTID STEEL SQUAT ELLER ZIOPLEX</div>
  </main>

  <script>
    const WORKER_URL = 'https://gubbsplinta-discord-proxy.gubbsplinta.workers.dev/post-maps';
    const weekdayNames = ['SÖNDAG','MÅNDAG','TISDAG','ONSDAG','TORSDAG','FREDAG','LÖRDAG'];
    const form = document.getElementById('countdownForm');
    const weekdayInput = document.getElementById('weekday');
    const timeInput = document.getElementById('timeText');
    const targetText = document.getElementById('targetText');
    const countdownNote = document.getElementById('countdownNote');
    const copyStatus = document.getElementById('copyStatus');
    const mapList = document.getElementById('mapList');
    const footLine = document.getElementById('footLine');
    const postDiscordBtn = document.getElementById('postDiscord');
    const els = { days: document.getElementById('days'), hours: document.getElementById('hours'), minutes: document.getElementById('minutes'), seconds: document.getElementById('seconds') };
    const defaultMaps = [
      { file: 'AquaE.sdc', full: 'Aqua' },
      { file: 'BankP.sdc', full: 'Panama Bank' },
      { file: 'CineU.sdc', full: 'Cinema' },
      { file: 'CpusS.sdc', full: 'Cpuss' },
      { file: 'DeftS.sdc', full: 'Deftech Belew' },
      { file: 'Entry.sdc', full: 'Entry' },
      { file: 'FactP.sdc', full: 'Factory' },
      { file: 'GhostS.sdc', full: 'Ghost' },
      { file: 'KrauU.sdc', full: 'Krauser Lab' },
      { file: 'Lobby.sdc', full: 'Lobby' },
      { file: 'Mise.sdc', full: 'Missile' },
      { file: 'MounU.sdc', full: 'Mount Hospital' },
      { file: 'MuseE.sdc', full: 'Museum' },
      { file: 'OffsD.sdc', full: 'Offshore Oilrig' },
      { file: 'OrphS.sdc', full: 'Orphanage' },
      { file: 'PanaS.sdc', full: 'Panama' },
      { file: 'PolaP.sdc', full: 'Polar Base' },
      { file: 'RiveI.sdc', full: 'Riverside' },
      { file: 'Sance.sdc', full: 'Sanctuary' },
      { file: 'ScheU.sdc', full: 'Schermerhorn' },
      { file: 'ShadP.sdc', full: 'Shadow Moses' },
      { file: 'SkysD.sdc', full: 'SpyScraper' },
      { file: 'SlauS.sdc', full: 'Slaughter House' },
      { file: 'StatP.sdc', full: 'State Union' },
      { file: 'SteeP.sdc', full: 'Steel Squat' },
      { file: 'StroD.sdc', full: 'Stockhouse' },
      { file: 'TermD.sdc', full: 'Terminal' },
      { file: 'VertL.sdc', full: 'Vertigo' },
      { file: 'WareP.sdc', full: 'Warehouse' },
      { file: 'ZiopD.sdc', full: 'Zioplex' }
    ];
    let maps = [...defaultMaps];
    let currentMapPick = [];
    let currentConfig = { weekday: 2, time: '20:30' };

    function validTime(value) {
      return /^([01][0-9]|2[0-3]):[0-5][0-9]$/.test(value);
    }
    function getNextOccurrence(targetWeekday, timeValue) {
      const now = new Date();
      const [hours, minutes] = timeValue.split(':').map(Number);
      const target = new Date(now);
      target.setHours(hours, minutes, 0, 0);
      let diffDays = (targetWeekday - now.getDay() + 7) % 7;
      if (diffDays === 0 && target <= now) diffDays = 7;
      target.setDate(now.getDate() + diffDays);
      return target;
    }
    function formatTarget(date) {
      const weekday = new Intl.DateTimeFormat('sv-SE', { weekday: 'long' }).format(date).toUpperCase();
      const datePart = new Intl.DateTimeFormat('sv-SE', { day: 'numeric', month: 'long', year: 'numeric' }).format(date).toUpperCase();
      const timePart = new Intl.DateTimeFormat('sv-SE', { hour: '2-digit', minute: '2-digit', hour12: false }).format(date);
      return `${weekday} ${datePart} KL ${timePart}`;
    }
    function formatRemaining(totalSeconds) {
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;
      return `${days} d, ${hours} h, ${minutes} min, ${seconds} sek`;
    }
    function updateCountdown() {
      const next = getNextOccurrence(currentConfig.weekday, currentConfig.time);
      const totalSeconds = Math.max(0, Math.floor((next - new Date()) / 1000));
      els.days.textContent = String(Math.floor(totalSeconds / 86400)).padStart(2, '0');
      els.hours.textContent = String(Math.floor((totalSeconds % 86400) / 3600)).padStart(2, '0');
      els.minutes.textContent = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, '0');
      els.seconds.textContent = String(totalSeconds % 60).padStart(2, '0');
      targetText.textContent = 'NÄSTA INSATS: ' + formatTarget(next);
      countdownNote.textContent = 'KVAR TILL SPEL: ' + formatRemaining(totalSeconds);
      footLine.textContent = 'ORDINARIE: VARJE ' + weekdayNames[currentConfig.weekday] + ' ' + currentConfig.time + ' · SISTA PLATSEN ÄR ALLTID STEEL SQUAT ELLER ZIOPLEX';
    }
    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }
    function parseMapLine(line) {
      const trimmed = line.trim();
      if (!trimmed || trimmed.startsWith('#')) return null;
      const parts = trimmed.split('|').map(part => part.trim()).filter(Boolean);
      if (parts.length === 0) return null;
      if (parts.length === 1) return { file: parts[0], full: parts[0].replace(/\.[^.]+$/, '') };
      return { file: parts[0], full: parts.slice(1).join(' | ') };
    }
    async function loadMapsFromTextFile() {
      try {
        const response = await fetch('./banor.txt', { cache: 'no-store' });
        if (!response.ok) throw new Error('Kunde inte läsa banor.txt');
        const content = await response.text();
        const parsedMaps = content.split(/\r?\n/).map(parseMapLine).filter(Boolean);
        if (parsedMaps.length >= 4) {
          maps = parsedMaps;
          copyStatus.textContent = 'BANOR LÄSTA FRÅN BANOR.TXT.';
          return;
        }
        copyStatus.textContent = 'BANOR.TXT HAR FÖR FÅ RADER, STANDARDLISTA ANVÄNDS.';
      } catch {
        copyStatus.textContent = 'BANOR.TXT HITTADES INTE, STANDARDLISTA ANVÄNDS.';
      }
      maps = [...defaultMaps];
    }
    function renderMaps() {
      const alwaysLastPool = maps.filter(map => ['SteeP.sdc', 'ZiopD.sdc'].includes(map.file));
      if (maps.length < 4) {
        currentMapPick = shuffle(maps).slice(0, Math.min(4, maps.length));
      } else if (alwaysLastPool.length) {
        const forcedLast = shuffle(alwaysLastPool)[0];
        const regularPool = maps.filter(map => map.file !== forcedLast.file);
        currentMapPick = shuffle(regularPool).slice(0, 3);
        currentMapPick.push(forcedLast);
      } else {
        currentMapPick = shuffle(maps).slice(0, 4);
      }
      mapList.innerHTML = currentMapPick.map((map, index) => `
        <div class="map-item">
          <div class="folder">${index + 1}. ${map.file}</div>
          <div class="map-name">${map.full}</div>
        </div>
      `).join('');
      copyStatus.textContent = 'NYTT FÖRSLAG FRAMTAGET.';
    }
    async function copyMapNames() {
      const text = currentMapPick.map(m => m.file).join('\n');
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const area = document.createElement('textarea');
        area.value = text;
        document.body.appendChild(area);
        area.select();
        document.execCommand('copy');
        area.remove();
      }
      copyStatus.textContent = 'FILNAMN KOPIERADE.';
    }
    function escapeCal(value) {
      return String(value).replace(/\\/g, '\\\\').replace(/\r?\n/g, '\\n').replace(/,/g, '\\,').replace(/;/g, '\\;');
    }
    function formatCalUTC(date) {
      const pad = n => String(n).padStart(2, '0');
      return date.getUTCFullYear() + pad(date.getUTCMonth() + 1) + pad(date.getUTCDate()) + 'T' + pad(date.getUTCHours()) + pad(date.getUTCMinutes()) + pad(date.getUTCSeconds()) + 'Z';
    }
    function downloadCalForMaps() {
      if (!currentMapPick.length) {
        copyStatus.textContent = 'SLUMPA MAPPAR FÖRST.';
        return;
      }
      const now = new Date();
      const start = new Date(now.getTime() + 30 * 60 * 1000);
      const end = new Date(start.getTime() + 60 * 60 * 1000);
      const lines = ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//GubbSplinta Matchoff//GitHub Sync//SV','CALSCALE:GREGORIAN'];
      currentMapPick.forEach((map, index) => {
        lines.push('BEGIN:VEVENT');
        lines.push('UID:gubbsplinta-' + now.getTime() + '-' + index + '@local');
        lines.push('DTSTAMP:' + formatCalUTC(now));
        lines.push('DTSTART:' + formatCalUTC(start));
        lines.push('DTEND:' + formatCalUTC(end));
        lines.push('SUMMARY:' + escapeCal('GubbSplinta Matchoff: ' + map.full));
        lines.push('DESCRIPTION:' + escapeCal('Map: ' + map.file + ' — ' + map.full));
        lines.push('END:VEVENT');
      });
      lines.push('END:VCALENDAR');
      const blob = new Blob([lines.join('\r\n')], { type: 'text/calendar;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'GubbSplinta-Matchoff.cal';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      copyStatus.textContent = 'KALENDERFIL SKAPAD.';
    }
    async function postMapsToDiscord() {
      if (!currentMapPick.length) {
        copyStatus.textContent = 'SLUMPA MAPPAR FÖRST.';
        return;
      }
      const next = getNextOccurrence(currentConfig.weekday, currentConfig.time);
      const totalSeconds = Math.max(0, Math.floor((next - new Date()) / 1000));
      const payload = {
        title: 'GubbSplinta Matchoff',
        weekday: weekdayNames[currentConfig.weekday],
        time: currentConfig.time,
        targetDate: formatTarget(next),
        remaining: formatRemaining(totalSeconds),
        maps: currentMapPick
      };
      postDiscordBtn.disabled = true;
      copyStatus.textContent = 'POSTAR TILL DISCORD OCH SYNKAR FIL...';
      try {
        const response = await fetch(WORKER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const result = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(result.error || 'Postning misslyckades');
        copyStatus.textContent = 'DISCORD-POST OCH GITHUB-SYNK KLAR.';
      } catch (error) {
        copyStatus.textContent = 'FEL: ' + error.message;
      } finally {
        postDiscordBtn.disabled = false;
      }
    }
    form.addEventListener('submit', (event) => {
      event.preventDefault();
      const timeValue = timeInput.value.trim();
      if (!validTime(timeValue)) {
        copyStatus.textContent = 'ANGE TID SOM 24H, T.EX. 20:30.';
        timeInput.focus();
        return;
      }
      currentConfig = { weekday: Number(weekdayInput.value), time: timeValue };
      updateCountdown();
      copyStatus.textContent = 'BOKNING UPPDATERAD.';
    });
    document.getElementById('presetTuesday').addEventListener('click', () => {
      weekdayInput.value = '2';
      timeInput.value = '20:30';
      form.requestSubmit();
    });
    document.getElementById('randomizeMaps').addEventListener('click', renderMaps);
    document.getElementById('copyMapNames').addEventListener('click', copyMapNames);
    document.getElementById('downloadCal').addEventListener('click', downloadCalForMaps);
    postDiscordBtn.addEventListener('click', postMapsToDiscord);
    updateCountdown();
    loadMapsFromTextFile().then(renderMaps);
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
