<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Repeterande nedräkning</title>
  <meta name="description" content="Repeterande nedräkning med Chaos Theory-mappslumpare.">
  <style>
    :root, [data-theme="light"] {
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --text-2xl: clamp(2rem, 1.2rem + 2.5vw, 3.5rem);
      --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem; --space-6: 1.5rem; --space-8: 2rem;
      --color-bg: #f7f6f2; --color-surface: #f9f8f5; --color-surface-2: #fbfbf9; --color-border: #d4d1ca;
      --color-text: #28251d; --color-text-muted: #7a7974; --color-primary: #01696f; --color-primary-hover: #0c4e54; --color-primary-highlight: #cedcd8;
      --radius-md: 0.5rem; --radius-lg: 0.75rem; --radius-xl: 1rem; --shadow-sm: 0 1px 2px rgba(0,0,0,.06); --shadow-md: 0 8px 24px rgba(0,0,0,.08);
      --font-body: Inter, system-ui, sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme]) { --color-bg:#171614; --color-surface:#1c1b19; --color-surface-2:#201f1d; --color-border:#393836; --color-text:#cdccca; --color-text-muted:#979592; --color-primary:#4f98a3; --color-primary-hover:#227f8b; --color-primary-highlight:#313b3b; --shadow-sm:0 1px 2px rgba(0,0,0,.2); --shadow-md:0 8px 24px rgba(0,0,0,.3); }
    }
    [data-theme="dark"] { --color-bg:#171614; --color-surface:#1c1b19; --color-surface-2:#201f1d; --color-border:#393836; --color-text:#cdccca; --color-text-muted:#979592; --color-primary:#4f98a3; --color-primary-hover:#227f8b; --color-primary-highlight:#313b3b; --shadow-sm:0 1px 2px rgba(0,0,0,.2); --shadow-md:0 8px 24px rgba(0,0,0,.3); }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100dvh; font-family:var(--font-body); font-size:var(--text-base); line-height:1.6; color:var(--color-text); background:radial-gradient(circle at top right,var(--color-primary-highlight),transparent 30%),var(--color-bg); }
    button,input,select { font:inherit; color:inherit; }
    .page { max-width:1000px; margin:0 auto; padding:var(--space-6); }
    .topbar { display:flex; justify-content:space-between; align-items:center; gap:var(--space-4); margin-bottom:var(--space-8); }
    .theme-toggle,.btn { min-height:44px; border:1px solid var(--color-border); border-radius:var(--radius-md); background:var(--color-surface-2); cursor:pointer; }
    .theme-toggle { width:44px; border-radius:9999px; background:var(--color-surface); box-shadow:var(--shadow-sm); }
    .hero { display:grid; gap:var(--space-4); margin-bottom:var(--space-8); }
    .eyebrow { font-size:var(--text-sm); color:var(--color-primary); font-weight:700; text-transform:uppercase; letter-spacing:.04em; }
    h1,h2 { margin:0; }
    .lead,.hint,.status,.copy-status { color:var(--color-text-muted); }
    .layout { display:grid; grid-template-columns:1.1fr .9fr; gap:var(--space-6); }
    .card { background:color-mix(in srgb,var(--color-surface) 92%,transparent); border:1px solid color-mix(in srgb,var(--color-text) 12%,transparent); border-radius:var(--radius-xl); box-shadow:var(--shadow-md); padding:var(--space-6); }
    .countdown-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:var(--space-3); margin-top:var(--space-4); }
    .time-box,.map-item { background:var(--color-surface-2); border:1px solid var(--color-border); border-radius:var(--radius-lg); padding:var(--space-4); }
    .time-box strong { display:block; font-size:clamp(1.8rem,1.1rem + 3vw,3rem); line-height:1; font-variant-numeric:tabular-nums; }
    .time-box span,.folder { display:block; font-size:var(--text-xs); color:var(--color-text-muted); margin-top:var(--space-2); text-transform:uppercase; letter-spacing:.08em; }
    form,.map-tools,.field { display:grid; gap:var(--space-4); }
    .row,.actions { display:flex; gap:var(--space-3); flex-wrap:wrap; }
    .row > .field { flex:1; }
    input,select { width:100%; border:1px solid var(--color-border); border-radius:var(--radius-md); background:var(--color-surface-2); padding:.85rem 1rem; }
    .btn { padding:.8rem 1rem; }
    .btn.primary { background:var(--color-primary); color:white; border-color:transparent; font-weight:700; }
    .map-list { display:grid; gap:var(--space-3); margin-top:var(--space-4); }
    .map-name { font-weight:700; }
    .tag { display:inline-block; margin-top:.45rem; padding:.15rem .45rem; border-radius:9999px; background:var(--color-primary-highlight); color:var(--color-primary); font-size:var(--text-xs); }
    @media (max-width: 820px) { .layout{grid-template-columns:1fr;} .countdown-grid{grid-template-columns:repeat(2,1fr);} }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <strong>Repeterande nedräkning</strong>
      <button class="theme-toggle" type="button" data-theme-toggle aria-label="Växla tema">◐</button>
    </header>

    <section class="hero">
      <div class="eyebrow">Återkommande målpunkt</div>
      <h1>Nedräkning till tisdag 20:30</h1>
      <p class="lead">V 1,5 med mappslumpare.</p>
    </section>

    <section class="layout">
      <article class="card">
        <h2>Aktiv nedräkning</h2>
        <div class="countdown-grid">
          <div class="time-box"><strong id="days">0</strong><span>Dagar</span></div>
          <div class="time-box"><strong id="hours">0</strong><span>Timmar</span></div>
          <div class="time-box"><strong id="minutes">0</strong><span>Minuter</span></div>
          <div class="time-box"><strong id="seconds">0</strong><span>Sekunder</span></div>
        </div>
        <p class="status" id="targetText"></p>
        <p class="status" id="statusText"></p>
      </article>

      <aside class="card">
        <h2>Inställningar</h2>
        <form id="countdownForm">
          <div class="field">
            <label for="title">Rubrik</label>
            <input id="title" type="text" value="Nedräkning till tisdag 20:30">
          </div>
          <div class="row">
            <div class="field">
              <label for="weekday">Veckodag</label>
              <select id="weekday"><option value="1">Måndag</option><option value="2" selected>Tisdag</option><option value="3">Onsdag</option><option value="4">Torsdag</option><option value="5">Fredag</option><option value="6">Lördag</option><option value="0">Söndag</option></select>
            </div>
            <div class="field">
              <label for="time">Tid</label>
              <input id="time" type="time" value="20:30" step="60">
            </div>
          </div>
          <div class="actions">
            <button class="btn primary" type="submit">Uppdatera</button>
            <button class="btn" type="button" id="presetTuesday">Tis 20:30</button>
          </div>
        </form>
      </aside>
    </section>

    <section class="card" style="margin-top:1.5rem;">
      <h2>Chaos Theory mappslumpare</h2>
      <p class="hint">P = Phoenix, E = Enhanced.</p>
      <div class="actions">
        <button class="btn primary" type="button" id="randomizeMaps">Slumpa 4</button>
        <button class="btn" type="button" id="copyMapNames">Kopiera filnamnet</button>
      </div>
      <div class="map-list" id="mapList"></div>
      <p class="copy-status" id="copyStatus"></p>
    </section>
  </div>

  <script>
    const weekdayNames = ['söndag','måndag','tisdag','onsdag','torsdag','fredag','lördag'];
    const form = document.getElementById('countdownForm');
    const titleInput = document.getElementById('title');
    const weekdayInput = document.getElementById('weekday');
    const timeInput = document.getElementById('time');
    const targetText = document.getElementById('targetText');
    const statusText = document.getElementById('statusText');
    const copyStatus = document.getElementById('copyStatus');
    const mapList = document.getElementById('mapList');
    const heroTitle = document.querySelector('h1');
    const els = { days: document.getElementById('days'), hours: document.getElementById('hours'), minutes: document.getElementById('minutes'), seconds: document.getElementById('seconds') };
    const maps = [
      { file: 'AquaE.sdc', full: 'Aqua', verified: false },
      { file: 'BankP.sdc', full: 'Panama Bank', verified: true },
      { file: 'CineU.sdc', full: 'Cinema', verified: true },
      { file: 'CpusS.sdc', full: 'Cpuss', verified: true },
      { file: 'DeftS.sdc', full: 'Deftech Belew', verified: true },
      { file: 'Entry.sdc', full: 'Entry', verified: false },
      { file: 'FactP.sdc', full: 'Factory', verified: false },
      { file: 'GhostS.sdc', full: 'Ghost', verified: false },
      { file: 'KrauU.sdc', full: 'Krauser Lab', verified: true },
      { file: 'Lobby.sdc', full: 'Lobby', verified: false },
      { file: 'Mise.sdc', full: 'Missile', verified: false },
      { file: 'MounU.sdc', full: 'Mount Hospital', verified: true },
      { file: 'MuseE.sdc', full: 'Museum', verified: false },
      { file: 'OffsD.sdc', full: 'Offshore Oilrig', verified: true },
      { file: 'OrphS.sdc', full: 'Orphanage', verified: false },
      { file: 'PanaS.sdc', full: 'Panama', verified: false },
      { file: 'PolaP.sdc', full: 'Polar Base', verified: true },
      { file: 'RiveI.sdc', full: 'Riverside', verified: false },
      { file: 'Sance.sdc', full: 'Sanctuary', verified: true },
      { file: 'ScheU.sdc', full: 'Schermerhorn', verified: true },
      { file: 'ShadP.sdc', full: 'Shadow Moses', verified: true },
      { file: 'SkysD.sdc', full: 'SpyScraper', verified: false },
      { file: 'SlauS.sdc', full: 'Slaughter House', verified: false },
      { file: 'StatP.sdc', full: 'State Union', verified: true },
      { file: 'SteeP.sdc', full: 'Steel Squat', verified: true },
      { file: 'StroD.sdc', full: 'Stockhouse', verified: true },
      { file: 'TermD.sdc', full: 'Terminal', verified: false },
      { file: 'VertL.sdc', full: 'Vertigo', verified: true },
      { file: 'WareP.sdc', full: 'Warehouse', verified: true },
      { file: 'ZiopD.sdc', full: 'Zioplex', verified: true }
    ];
    let currentMapPick = [];

    (function initTheme(){
      const btn = document.querySelector('[data-theme-toggle]');
      let current = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', current);
      btn.addEventListener('click', () => {
        current = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', current);
      });
    })();

    function getNextOccurrence(targetWeekday, timeValue) {
      const now = new Date();
      const [hours, minutes] = timeValue.split(':').map(Number);
      const target = new Date(now);
      target.setHours(hours, minutes, 0, 0);
      let diffDays = (targetWeekday - now.getDay() + 7) % 7;
      if (diffDays === 0 && target <= now) diffDays = 7;
      target.setDate(now.getDate() + diffDays);
      return target;
    }

    function formatTarget(date) {
      return new Intl.DateTimeFormat('sv-SE', { weekday:'long', year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit' }).format(date);
    }

    let currentConfig = { title: 'Nedräkning till tisdag 20:30', weekday: 2, time: '20:30' };

    function updateCountdown() {
      const next = getNextOccurrence(currentConfig.weekday, currentConfig.time);
      const totalSeconds = Math.max(0, Math.floor((next - new Date()) / 1000));
      els.days.textContent = Math.floor(totalSeconds / 86400);
      els.hours.textContent = String(Math.floor((totalSeconds % 86400) / 3600)).padStart(2, '0');
      els.minutes.textContent = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, '0');
      els.seconds.textContent = String(totalSeconds % 60).padStart(2, '0');
      heroTitle.textContent = currentConfig.title || 'Repeterande nedräkning';
      targetText.textContent = 'Nästa mål: ' + formatTarget(next);
      statusText.textContent = 'Räknar mot varje ' + weekdayNames[currentConfig.weekday] + ' kl. ' + currentConfig.time + '.';
    }

    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function renderMaps() {
      const alwaysLastPool = maps.filter(map => ['SteeP.sdc', 'ZiopD.sdc'].includes(map.file));
      const forcedLast = shuffle(alwaysLastPool)[0];
      const regularPool = maps.filter(map => map.file !== forcedLast.file);
      currentMapPick = shuffle(regularPool).slice(0, 3);
      currentMapPick.push(forcedLast);
      mapList.innerHTML = currentMapPick.map((map, index) => `
        <div class="map-item">
          <div class="folder">${index + 1}. ${map.file}</div>
          <div class="map-name">${map.full}</div>
        </div>
      `).join('');
      copyStatus.textContent = 'Nya mappar slumpade.';
    }

    async function copyMapNames() {
      const text = currentMapPick.map(m => m.file).join('\n');
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const area = document.createElement('textarea');
        area.value = text;
        document.body.appendChild(area);
        area.select();
        document.execCommand('copy');
        area.remove();
      }
      copyStatus.textContent = 'Bara filnamnen kopierades.';
    }

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      currentConfig = { title: titleInput.value.trim() || 'Repeterande nedräkning', weekday: Number(weekdayInput.value), time: timeInput.value || '20:30' };
      updateCountdown();
    });
    document.getElementById('presetTuesday').addEventListener('click', () => {
      weekdayInput.value = '2'; timeInput.value = '20:30'; titleInput.value = 'Nedräkning till tisdag 20:30'; form.requestSubmit();
    });
    document.getElementById('randomizeMaps').addEventListener('click', renderMaps);
    document.getElementById('copyMapNames').addEventListener('click', copyMapNames);
    updateCountdown(); renderMaps(); setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
